<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0b0e14;
    --bg2:        #0f1319;
    --bg3:        #141924;
    --border:     #1e2736;
    --green:      #39ff8a;
    --green-dim:  #1e8c4e;
    --green-faint:#0d3322;
    --yellow:     #f5c842;
    --yellow-dim: #7a6219;
    --cyan:       #56d4f5;
    --orange:     #ff9f43;
    --purple:     #a29bfe;
    --red:        #ff5f6d;
    --white:      #d4dce8;
    --gray:       #5a6a80;
    --glow:       0 0 8px rgba(57,255,138,0.35);
    --glow-sm:    0 0 4px rgba(57,255,138,0.2);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 14px;
    line-height: 1.65;
    overflow: hidden;
  }

  .window {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 980px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: var(--bg);
    position: relative;
  }

  /* ── TITLE BAR ── */
  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }
  .dots { display: flex; gap: 7px; }
  .dot  { width: 13px; height: 13px; border-radius: 50%; }
  .dot-r { background: #ff5f56; box-shadow: 0 0 6px #ff5f5680; }
  .dot-y { background: #febc2e; box-shadow: 0 0 6px #febc2e80; }
  .dot-g { background: #28c840; box-shadow: 0 0 6px #28c84080; }
  .titlebar-label { margin: 0 auto; color: var(--gray); font-size: 12px; letter-spacing: 0.08em; }

  /* ── TERMINAL BODY ── */
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 10px;
    scroll-behavior: smooth;
    background:
      radial-gradient(ellipse at 85% 0%, rgba(57,255,138,0.045) 0%, transparent 55%),
      radial-gradient(ellipse at 15% 100%, rgba(86,212,245,0.025) 0%, transparent 50%),
      var(--bg);
  }
  #terminal::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.045) 2px, rgba(0,0,0,0.045) 4px);
    pointer-events: none;
    z-index: 10;
  }
  #terminal::-webkit-scrollbar { width: 5px; }
  #terminal::-webkit-scrollbar-track { background: var(--bg2); }
  #terminal::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }

  /* ── BASE TEXT ── */
  .line { margin: 0; white-space: pre-wrap; word-break: break-word; }
  .c-green  { color: var(--green); }
  .c-yellow { color: var(--yellow); }
  .c-cyan   { color: var(--cyan); }
  .c-orange { color: var(--orange); }
  .c-purple { color: var(--purple); }
  .c-gray   { color: var(--gray); }
  .c-white  { color: var(--white); }
  .c-red    { color: var(--red); }
  .c-gdim   { color: var(--green-dim); }

  .prompt-echo { color: var(--green-dim); }
  .prompt-echo .cmd-part { color: var(--green); font-weight: 600; }

  /* ── BANNER ── */
  .banner-block {
    border: 1px solid var(--green-dim);
    border-radius: 5px;
    padding: 18px 22px;
    margin-bottom: 18px;
    background: var(--green-faint);
    box-shadow: var(--glow), inset 0 0 40px rgba(57,255,138,0.025);
    position: relative;
    overflow: hidden;
  }
  .banner-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }
  .banner-ascii {
    color: var(--green);
    font-size: 11px;
    line-height: 1.3;
    text-shadow: var(--glow-sm);
    white-space: pre;
    letter-spacing: 0.05em;
  }
  .banner-name  { font-size: 20px; font-weight: 700; color: var(--green); text-shadow: var(--glow); letter-spacing: 0.05em; margin-top: 8px; }
  .banner-title { color: var(--yellow); font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; }
  .banner-stack { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
  .banner-tag   { background: rgba(57,255,138,0.1); border: 1px solid var(--green-dim); border-radius: 3px; padding: 1px 8px; font-size: 11px; color: var(--green); }
  .banner-meta  { margin-top: 10px; color: var(--gray); font-size: 12px; line-height: 1.8; }
  .banner-meta span { color: var(--white); }
  .banner-hint  { margin-top: 12px; color: var(--green-dim); font-size: 11.5px; border-top: 1px solid #1e2736; padding-top: 10px; }
  .banner-hint b { color: var(--green); }

  /* ── SECTION HEADER ── */
  .section-header {
    color: var(--yellow);
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--yellow-dim);
    padding-bottom: 4px;
    margin: 14px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── COMPANY CARD ── */
  .company-card {
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 4px;
    padding: 12px 16px;
    margin: 8px 0;
    background: rgba(57,255,138,0.03);
  }
  .company-card .co-name  { color: var(--green); font-weight: 700; font-size: 14px; }
  .company-card .co-role  { color: var(--yellow); font-size: 12.5px; font-weight: 600; margin-top: 2px; }
  .company-card .co-meta  { color: var(--gray); font-size: 11.5px; margin-top: 3px; display: flex; flex-wrap: wrap; gap: 12px; }
  .company-card .co-meta span { color: var(--cyan); }

  /* ── SUBSECTION ── */
  .subsec {
    margin: 10px 0 4px 0;
    color: var(--cyan);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .subsec::before { content: '──'; color: var(--border); }
  .subsec::after  { content: '──────────────────'; color: var(--border); flex: 1; overflow: hidden; letter-spacing: 0.01em; }

  /* ── BULLET ── */
  .bullet {
    display: flex;
    gap: 8px;
    padding: 3px 0 3px 4px;
    color: var(--white);
    font-size: 12.5px;
    line-height: 1.6;
    align-items: flex-start;
  }
  .bullet .b-arrow { color: var(--green); flex-shrink: 0; margin-top: 1px; }
  .bullet .b-text  { flex: 1; }
  .bullet .b-text .kw { color: var(--yellow); font-weight: 600; }
  .bullet .b-text .tech { color: var(--cyan); }
  .bullet .b-text .val  { color: var(--orange); }

  /* ── PROJECT CARD ── */
  .proj-card {
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan);
    border-radius: 4px;
    padding: 12px 16px;
    margin: 8px 0;
    background: rgba(86,212,245,0.02);
  }
  .proj-card .proj-name { color: var(--cyan); font-weight: 700; font-size: 13.5px; }
  .proj-card .proj-type { color: var(--gray); font-size: 11.5px; margin-top: 2px; }
  .proj-card .proj-stack { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

  /* ── SKILL SECTIONS ── */
  .skill-group {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    margin: 6px 0;
    background: rgba(255,255,255,0.01);
  }

  .sg-label { color: var(--yellow); font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }
  .sg-items { display: flex; flex-wrap: wrap; gap: 5px; }

  /* ── TAGS ── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;

  .tag-green  { background: rgba(57,255,138,0.1);  border: 1px solid rgba(57,255,138,0.3);  color: var(--green); }
  .tag-cyan   { background: rgba(86,212,245,0.1);  border: 1px solid rgba(86,212,245,0.3);  color: var(--cyan); }
  .tag-yellow { background: rgba(245,200,66,0.1);  border: 1px solid rgba(245,200,66,0.3);  color: var(--yellow); }
  .tag-orange { background: rgba(255,159,67,0.1);  border: 1px solid rgba(255,159,67,0.3);  color: var(--orange); }
  .tag-purple { background: rgba(162,155,254,0.1); border: 1px solid rgba(162,155,254,0.3); color: var(--purple); }
  .tag-gray   { background: rgba(90,106,128,0.15); border: 1px solid rgba(90,106,128,0.3);  color: var(--gray); }

  .edu-card {
    border-left: 3px solid var(--purple);
    padding: 8px 0 8px 14px;
    margin: 6px 0;
  }
  .edu-card .edu-deg  { color: var(--white); font-weight: 600; font-size: 13px; }
  .edu-card .edu-inst { color: var(--cyan); font-size: 12px; margin-top: 1px; }
  .edu-card .edu-meta { color: var(--gray); font-size: 11.5px; margin-top: 2px; }
  .edu-card .edu-score { color: var(--green); }

  /* ── HELP TABLE ── */
  .help-row { display: grid; grid-template-columns: 140px 1fr; gap: 4px; padding: 3px 0; font-size: 12.5px; }
  .help-cmd  { color: var(--green); font-weight: 600; }
  .help-desc { color: var(--gray); }

  /* ── CONTACT ── */
  .contact-row { display: grid; grid-template-columns: 96px 1fr; gap: 6px; padding: 4px 0; font-size: 12.5px; align-items: center; }
  .contact-key { color: var(--yellow); }
  .contact-val { color: var(--white); }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* ── INPUT ROW ── */
  .input-area {
    display: flex;
    align-items: center;
    padding: 10px 24px 14px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .ps1 { white-space: nowrap; font-size: 13.5px; font-weight: 600; user-select: none; flex-shrink: 0; }
  .ps1-user   { color: var(--green); text-shadow: var(--glow-sm); }
  .ps1-sep    { color: var(--gray); }
  .ps1-dir    { color: var(--cyan); }
  .ps1-dollar { color: var(--yellow); margin-right: 9px; }

  #cmd-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--green); font-family: inherit; font-size: 13.5px;
    font-weight: 500; caret-color: var(--green); min-width: 0;
  }
  #cmd-input::selection { background: rgba(57,255,138,0.25); }
  #cmd-input::placeholder { color: var(--gray); opacity: 0.5; }

  /* ── ANIMATIONS ── */
  @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .output-block { animation: fadein 0.18s ease; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    html, body { font-size: 12px; }
    .window { border: none; }
    #terminal { padding: 14px 14px 6px; }
    .input-area { padding: 8px 14px 10px; }
    .banner-ascii { display: none; }
    .banner-name { font-size: 17px; }
    .help-row { grid-template-columns: 110px 1fr; }
    .contact-row { grid-template-columns: 80px 1fr; }
    .subsec::after { display: none; }
  }
</style>

const terminal = document.getElementById('terminal');
const input    = document.getElementById('cmd-input');
let cmdHistory = [];
let histIdx    = -1;

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function appendBlock(fn) {
  const d = el('div', 'output-block');
  fn(d);
  terminal.appendChild(d);
  scrollDown();
}

function scrollDown() { terminal.scrollTop = terminal.scrollHeight; }

function sectionHeader(parent, icon, text) {
  const h = el('div', 'section-header');
  h.innerHTML = `<span>${icon}</span><span>${text}</span>`;
  parent.appendChild(h);
}

function subsec(parent, icon, title) {
  const s = el('div', 'subsec', `${icon} ${title}`);
  parent.appendChild(s);
}

function bullet(parent, htmlText) {
  const b = el('div', 'bullet');
  b.innerHTML = `<span class="b-arrow">▸</span><span class="b-text">${htmlText}</span>`;
  parent.appendChild(b);
}

function formatBullet(raw) {
  // Replace <kw>, <tech>, <val> markers
  return raw
    .replace(/<kw>(.*?)<\/kw>/g, '<span class="kw">$1</span>')
    .replace(/<tech>(.*?)<\/tech>/g, '<span class="tech">$1</span>')
    .replace(/<val>(.*?)<\/val>/g, '<span class="val">$1</span>');
}

function gap(parent, h=6) {
  const d = el('div');
  d.style.height = h + 'px';
  parent.appendChild(d);
}

function divider(parent) {
  parent.appendChild(el('hr', 'divider'));
}

};

// ─── EXECUTE ──────────────────────────────────────
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function execCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  appendBlock(div => {
    div.innerHTML = `<p class="line prompt-echo"><span class="c-gdim">ajay@portfolio:~</span><span class="c-yellow"> $</span> <span class="cmd-part">${esc(raw)}</span></p>`;
  });
  if (!cmd) { scrollDown(); return; }
  if (COMMANDS[cmd]) {
    COMMANDS[cmd]();
  } else {
    appendBlock(div => {
      div.appendChild(el('p', 'line c-red', `bash: ${esc(cmd)}: command not found`));
      div.appendChild(el('p', 'line c-gray', `Type <span class="c-green">help</span> for available commands.`));
    });
  }
}

// ─── INPUT ────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = input.value;
    if (v.trim()) { cmdHistory.unshift(v); if (cmdHistory.length > 60) cmdHistory.pop(); }
    histIdx = -1;
    input.value = '';
    execCommand(v);
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0); }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = cmdHistory[histIdx]; } else { histIdx = -1; input.value = ''; }
    return;
  }
});

terminal.addEventListener('click', () => input.focus());
document.querySelector('.window').addEventListener('click', () => input.focus());
